<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng</title>
  </head>

  <body>
    <!-- Tìm kiếm -->
    <form>
      <label for="search"><b>Tìm kiếm sản phẩm</b></label>
      <input type="text" id="search" placeholder="Nhập tên sản phẩm..." />
    </form>

    <!-- Giỏ hàng -->
    <h1>Giỏ hàng</h1>

    <table border="1" cellspacing="0" cellpadding="5">
      <thead>
        <tr>
          <th>STT</th>
          <th>Sản phẩm</th>
          <th>Đơn giá</th>
          <th>Số lượng</th>
          <th>Thành tiền</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Mercedes C300</td>
          <td>1.599.000.000đ</td>
          <td>1</td>
          <td>1.599.000.000đ</td>
        </tr>

        <tr>
          <td>2</td>
          <td>Toyota Camry 2.5Q</td>
          <td>1.370.000.000đ</td>
          <td>1</td>
          <td>1.370.000.000đ</td>
        </tr>

        <tr>
          <td>3</td>
          <td>BMW X5</td>
          <td>3.909.000.000đ</td>
          <td>1</td>
          <td>3.909.000.000đ</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th colspan="4">Tổng cộng</th>
          <th>6.878.000.000đ</th>
        </tr>
      </tfoot>
    </table>

    <!-- Form thanh toán -->
    <form action="#" method="POST">
      <fieldset>
        <legend>Phương thức thanh toán</legend>

        <label>
          <input type="radio" name="payment" value="cod" />
          COD
        </label>

        <label>
          <input type="radio" name="payment" value="bank" />
          Chuyển khoản
        </label>

        <label>
          <input type="radio" name="payment" value="wallet" />
          Ví điện tử
        </label>
      </fieldset>

      <!-- Mã giảm giá -->
      <fieldset>
        <legend>Mã giảm giá</legend>

        <label for="discount">Nhập mã:</label>

        <input
          type="text"
          id="discount"
          name="discount"
          placeholder="SALE2026"
          pattern="SALE\d{4}"
        />

        <label for="note">Ghi chú:</label>

        <textarea
          id="note"
          rows="5"
          cols="25"
          placeholder="Ghi chú đơn hàng"
        ></textarea>
      </fieldset>

      <!-- Thông tin giao hàng -->
      <fieldset>
        <legend>Thông tin giao hàng</legend>

        <!-- Thành phố -->
        <label for="city">Thành phố:</label>

        <select id="city" name="city">
          <option>--Chọn thành phố--</option>
          <option>Hà Nội</option>
          <option>TP.HCM</option>
          <option>Đà Nẵng</option>
        </select>

        <!-- Quận huyện -->
        <label for="district">Quận/Huyện:</label>

        <select id="district" name="district">
          <option>--Chọn quận/huyện--</option>
          <option>Ba Đình</option>
          <option>Cầu Giấy</option>
          <option>Hoàn Kiếm</option>
        </select>

        <!-- Địa chỉ -->
        <label for="address">Địa chỉ chi tiết:</label>

        <textarea
          id="address"
          rows="4"
          cols="25"
          placeholder="Nhập địa chỉ chi tiết"
        ></textarea>

        <!-- Giới tính -->
        <p>
          Giới tính:

          <label>
            <input type="radio" name="gender" />
            Nam
          </label>

          <label>
            <input type="radio" name="gender" />
            Nữ
          </label>

          <label>
            <input type="radio" name="gender" />
            Khác
          </label>
        </p>

        <!-- Ngày giao -->
        <label for="delivery-date"> Thời gian giao hàng mong muốn: </label>

        <input type="date" id="delivery-date" name="delivery-date" />

        <!-- Khung giờ -->
        <label for="time-slot"> Giờ giao hàng mong muốn: </label>

        <select id="time-slot" name="time-slot">
          <option>--Chọn khung giờ--</option>
          <option>Sáng 8h - 12h</option>
          <option>Chiều 14h - 18h</option>
          <option>Tối 18h - 21h</option>
        </select>

        <!-- Range -->
        <label for="delivery-time"> Thời gian giao hàng: </label>

        <input
          type="range"
          id="delivery-time"
          min="1"
          max="7"
          value="3"
          oninput="dayOutput.value = this.value"
        />

        <output id="dayOutput">3</output> ngày
      </fieldset>

      <br />

      <!-- Button -->
      <button type="submit">Xác nhận đặt hàng</button>

      <button type="reset">Reset</button>
    </form>
  </body>
</html>
